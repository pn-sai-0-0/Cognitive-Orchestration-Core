# =====================================================================
# CognitiveOC Extended Dataset Registry (YAML mirror for audit/governance)
# =====================================================================
# This is the human-readable mirror of the EXTENDED registry embedded
# in 02b_corpus_acquisition_manager_extended.py. The Python script
# is the source of truth; this YAML is for audit/review.
#
# All entries below are *gap-filling* additions to the original registry
# in 05_dataset_registry.yaml. They target empty / underrepresented
# categories: E, F, I, K, M as well as expansion of A, B, C, D, G, L.
#
# Risk: 0.0=zero, 0.1=very low, 0.2=low, 0.3+=moderate/high (warehouse-only)
# Priority: 1=must-have, 2=recommended, 3=optional
# =====================================================================

registry_version: 2.1-extended
last_audited: "2026-06-26"
audit_policy: zero_license_risk
parent_registry: "05_dataset_registry.yaml"

# Approximate category targets (raw warehouse tokens)
category_targets:
  A_books:              "25B"
  B_educational:        "10B"
  C_reasoning:          "15B"
  D_conversations:      "15B"
  E_technical_docs:     "20B"
  F_articles:           "30B"
  G_research_papers:    "10B"
  H_synthetic:          "10B (after first model)"
  I_cognition:          "5B"
  J_retrieval:          "5B"
  K_knowledge_graph:    "5-10B"
  L_language_resources: "3B"
  M_legal_government:   "5-10B"
  N_evaluation:         "not counted for training"

