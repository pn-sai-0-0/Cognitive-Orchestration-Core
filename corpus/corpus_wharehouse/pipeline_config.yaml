runtime:
  workers: 4
  chunk_size: 500
  memory_limit_mb: 2048
  resume: true
  incremental: true
  seed: 42
validation:
  allowed_extensions: [".txt", ".md", ".json", ".jsonl", ".csv", ".xml", ".parquet"]
  materialize_mode: link
deduplication:
  simhash_hamming_threshold: 3
  minhash_jaccard_threshold: 0.90
  signature_bands: 8
quality:
  min_chars: 32
  min_quality_score: 0.35
  max_nonprintable_ratio: 0.05
  max_ocr_noise_ratio: 0.25
language:
  default: en
  confidence_threshold: 0.65
  mixed_threshold: 0.20
balancing:
  enabled: true
  max_category_ratio: 1.5
  min_docs_per_bucket: 1
splits:
  train: 0.96
  validation: 0.02
  test: 0.02
tokenizer:
  target_chunk_tokens: 200000
  max_docs_per_chunk: 2000
logging:
  jsonl: true
  console: true
