  - {key: arc_challenge, kind: hf, hf_id: allenai/ai2_arc, hf_config: ARC-Challenge, category: C, subdir: arc_challenge, license: CC-BY-SA-4.0, risk: 0.1, priority: 1, tokens: "~2M"}
  - {key: arc_easy, kind: hf, hf_id: allenai/ai2_arc, hf_config: ARC-Easy, category: C, subdir: arc_easy, license: CC-BY-SA-4.0, risk: 0.1, priority: 1, tokens: "~3M"}
