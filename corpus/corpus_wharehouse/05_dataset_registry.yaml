  - {key: framenet_info, kind: http, url: "https://framenet.icsi.berkeley.edu/fndrupal/framenet_data", category: L, subdir: framenet, license: CC-BY-3.0, risk: 0.0, priority: 2, tokens: "~30M"}

  # M. Legal / Government
  - {key: courtlistener_info, kind: http, url: "https://www.courtlistener.com/help/api/bulk-data/", category: M, subdir: courtlistener, license: Public Domain, risk: 0.0, priority: 2, tokens: "~20B"}
  - {key: ietf_rfc_index, kind: http, url: "https://www.rfc-editor.org/rfc-index.txt", category: M, subdir: ietf_rfcs, license: BSD-like, risk: 0.0, priority: 2, tokens: "~200M"}
