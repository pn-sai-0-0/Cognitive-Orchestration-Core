  # Warehouse-only
  - {key: sciq, kind: hf_warehouse_only, hf_id: allenai/sciq, category: C, subdir: sciq, license: CC-BY-NC-3.0, risk: 0.4, priority: 3, warehouse_only: true}
  - {key: ms_marco, kind: hf_warehouse_only, hf_id: microsoft/ms_marco, hf_config: v2.1, category: J, subdir: ms_marco, license: Microsoft Research, risk: 0.6, priority: 3, warehouse_only: true}
