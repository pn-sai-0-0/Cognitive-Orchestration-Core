# =====================================================================
# CognitiveOC Dataset Registry (YAML mirror for audit/governance)
# =====================================================================
# This is the human-readable mirror of the registry embedded in
# 02_corpus_acquisition_manager.py. The Python script is the source
# of truth; this YAML is for audit/review.
#
# Risk: 0.0=zero, 0.1=very low, 0.2=low, 0.3+=moderate/high
# Priority: 1=must-have, 2=recommended, 3=optional
# =====================================================================

registry_version: 2.0
last_audited: "2026-06-25"
audit_policy: zero_license_risk

sources:
  # D. Conversations
  - {key: oasst2, kind: hf, hf_id: OpenAssistant/oasst2, category: D, subdir: oasst2, license: Apache-2.0, risk: 0.0, priority: 1, tokens: "~150M"}
  - {key: dolly15k, kind: hf, hf_id: databricks/databricks-dolly-15k, category: D, subdir: dolly15k, license: CC-BY-SA-3.0, risk: 0.1, priority: 1, tokens: "~10M"}

  # C. Reasoning
