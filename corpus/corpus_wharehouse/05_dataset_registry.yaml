  - {key: openwebmath, kind: hf, hf_id: open-web-math/open-web-math, category: C, subdir: openwebmath, license: ODC-By-1.0, risk: 0.2, priority: 1, tokens: "~14.7B"}
  - {key: proof_pile_2, kind: hf, hf_id: EleutherAI/proof-pile-2, category: C, subdir: proof_pile_2, license: Mixed, risk: 0.2, priority: 2, tokens: "~55B"}
  - {key: metamathqa, kind: hf, hf_id: meta-math/MetaMathQA, category: C, subdir: metamathqa, license: MIT, risk: 0.0, priority: 1, tokens: "~400M"}
