  # F. Articles
  - {key: wikipedia_dump, kind: http, url: "https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-pages-articles.xml.bz2", category: F, subdir: wikipedia, license: CC-BY-SA-4.0, risk: 0.1, priority: 1, tokens: "~4B", notes: "~22GB compressed"}

