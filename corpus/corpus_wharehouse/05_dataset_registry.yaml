  - {key: arxiv_api, kind: http, url: "https://export.arxiv.org/api/query", category: G, subdir: arxiv, license: Mixed, risk: 0.2, priority: 1, tokens: "metadata seed"}
  - {key: pmc_oa_index, kind: http, url: "https://ftp.ncbi.nlm.nih.gov/pub/pmc/oa_file_list.csv", category: G, subdir: pmc_oa, license: Mixed CC, risk: 0.1, priority: 2, tokens: "index only"}

